<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>

            border-top: 1px solid rgba(255, 255, 255, 0.1);

        .safe-route-glow {
            filter: drop-shadow(0 0 8px rgba(78, 222, 163, 0.4));

        body {
            background-color: #0b1326;
            color: #dae2fd;
            overflow: hidden;
        }

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-bright": "#31394d",
                      "surface-container-highest": "#2d3449",
                      "surface-container-low": "#131b2e",
                      "secondary-fixed-dim": "#4edea3",
                      "on-tertiary-fixed-variant": "#39485a",
                      "on-tertiary": "#233143",
                      "surface-container-lowest": "#060e20",
                      "on-error-container": "#ffdad6",
                      "on-tertiary-container": "#1c2b3c",
                      "secondary-container": "#00a572",
                      "surface-container-high": "#222a3d",
                      "on-primary-fixed-variant": "#2f2ebe",
                      "on-error": "#690005",
                      "outline-variant": "#464554",
                      "on-secondary-fixed-variant": "#005236",
                      "inverse-primary": "#494bd6",
                      "on-primary-fixed": "#07006c",
                      "background": "#0b1326",
                      "surface": "#0b1326",
                      "secondary-fixed": "#6ffbbe",
                      "outline": "#908fa0",
                      "on-surface": "#dae2fd",
                      "error-container": "#93000a",
                      "surface-tint": "#c0c1ff",
                      "tertiary-fixed": "#d4e4fa",
                      "on-surface-variant": "#c7c4d7",
                      "tertiary-fixed-dim": "#b9c8de",
                      "primary-container": "#8083ff",
                      "primary": "#c0c1ff",
                      "inverse-surface": "#dae2fd",
                      "error": "#ffb4ab",
                      "secondary": "#4edea3",
                      "primary-fixed-dim": "#c0c1ff",
                      "tertiary-container": "#8392a6",
                      "surface-dim": "#0b1326",
                      "tertiary": "#b9c8de",
                      "surface-variant": "#2d3449",
                      "on-secondary": "#003824",

              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "lg": "24px",
                      "gutter-mobile": "16px",
                      "sm": "12px",
                      "xxl": "48px",
                      "base": "4px",
                      "xs": "8px",
                      "xl": "32px",
                      "margin-mobile": "20px",
                      "md": "16px"
              },
              "fontFamily": {
                      "label-md": ["Inter"],
                      "headline-md": ["Inter"],
                      "label-lg": ["Inter"],
                      "body-lg": ["Inter"],
                      "display-lg": ["Inter"],
                      "headline-lg": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-body-md bg-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface-container-low/80 backdrop-blur-xl border-b border-outline-variant/10 shadow-sm shadow-primary/5 flex justify-between items-center px-gutter-mobile h-14">
<button class="hover:bg-surface-bright/20 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary">SafePassage</h1><span class="text-[10px] text-on-surface-variant/60 uppercase tracking-widest ml-2">[Simulation Mode] - No real tracking</span>
<button class="hover:bg-surface-bright/20 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-primary">account_circle</span>
</button>
</header><div class="fixed top-14 left-0 w-full z-40 px-gutter-mobile py-2 bg-surface-container-low/80 backdrop-blur-xl border-b border-outline-variant/10"><div class="relative flex items-center bg-surface-container-highest/50 rounded-lg px-4 h-12 border border-outline-variant/30"><span class="material-symbols-outlined text-on-surface-variant mr-2">search</span><input class="bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/60 w-full font-body-md" placeholder="Search for a Safe Route (Well-Lit Paths)" type="text"/></div></div>
<!-- Main Canvas: Map View -->
<main class="relative flex-grow h-screen w-full overflow-hidden">
<!-- Mock Map Environment -->
<div class="absolute inset-0 z-0 bg-surface-container-lowest">
<img class="w-full h-full object-cover opacity-40 mix-blend-luminosity grayscale" data-alt="A highly detailed overhead map of a modern metropolitan city at night, rendered in a dark charcoal and slate aesthetic. The streets are defined by subtle geometric lines with soft ambient glows from city lights. The color palette is dominated by deep blues and greys, reflecting a professional and calm safety application environment. Intricate details like park outlines and river curves are visible under a soft digital haze." data-location="London" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHikKQs0E-jU1xLWllykUvytv8No8Xw4gY_MAaoslph_lyWgRT08nwlGXlXwpacE1WUGi5Edxec1eCddJwRdFwOIv7301pyf5dBKayZJCs3fL0tzgh0ilW3ZzOcZco1qY3o0azlKGSPFvBy923ebZKsiB5S2gG8z4T1cQzGSDMrUIP6nMbep-L_wFs3E6LOaIEdZpxuhCHHZ5e6HIB9I9mRoYAfRwmUAlCOU8Wq7RHJpipavyHjfYwUSB8S5Sgb0RnsgXp9_cmr60"/>
<!-- SVG Overlay for Routes -->
<svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
<!-- Fastest Route (Grey) -->
<path d="M 100 600 Q 250 500 400 300 T 700 150" fill="none" stroke="#464554" stroke-dasharray="1, 12" stroke-linecap="round" stroke-width="6"></path>
<!-- Safe Route (Emerald Green) -->
<path class="safe-route-glow" d="M 100 600 Q 150 400 400 450 T 700 150" fill="none" stroke="#4edea3" stroke-linecap="round" stroke-width="8"></path>
<!-- User Location Indicator -->
<circle class="animate-pulse" cx="100" cy="600" fill="#c0c1ff" r="10"></circle>
<circle class="animate-ping" cx="100" cy="600" fill="#c0c1ff" fill-opacity="0.2" r="20"></circle>
<!-- Destination Indicator -->
<circle cx="700" cy="150" fill="#ffb4ab" r="12"></circle>
<text fill="#dae2fd" font-family="Inter" font-size="14" font-weight="600" x="720" y="155">Home</text>
</svg>
</div>
<!-- Floating Safe Route Badge -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 z-10">
<div class="glass-card px-4 py-2 rounded-full border border-secondary/30 flex items-center gap-2 shadow-lg shadow-secondary/10">
<span class="material-symbols-outlined text-secondary text-[18px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-secondary font-label-lg text-label-lg">Well-Lit &amp; Crowded</span>
</div>
</div>
<!-- Quick Info Panel (Bottom Layout) -->
<div class="absolute bottom-32 left-margin-mobile right-margin-mobile z-10 flex flex-col gap-4">
<div class="glass-card p-lg rounded-lg border border-outline-variant/10 shadow-xl">
<div class="flex justify-between items-center mb-md">
<div>
<p class="text-on-surface-variant text-label-md font-label-md">SAFE ROUTE ACTIVE</p>
<h2 class="text-on-surface text-headline-md font-headline-md">To: 5th Ave Residence</h2>
</div>
<div class="text-right">
<p class="text-secondary text-headline-md font-headline-md">12 min</p>
<p class="text-on-surface-variant text-label-md font-label-md">0.8 miles</p>
</div>
</div>
<div class="flex gap-sm">
<button class="flex-1 bg-primary text-on-primary py-3 rounded-full font-label-lg text-label-lg active:scale-95 transition-transform">
                        Start Walking
                    </button>
<button class="glass-card border border-outline-variant/30 text-on-surface px-6 rounded-full font-label-lg text-label-lg active:scale-95 transition-transform">
                        Share Trip
                    </button>
</div>
</div>
</div>
<!-- Stealth SOS Button -->
<div class="absolute bottom-32 right-gutter-mobile z-20">
<button class="group relative flex items-center justify-center w-16 h-16 bg-primary-container text-on-primary-container rounded-full shadow-[0_8px_32px_rgba(128,131,255,0.4)] hover:scale-105 active:scale-90 transition-all duration-300 overflow-hidden" id="sos-button">
<span class="material-symbols-outlined text-[32px] group-hover:hidden" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="hidden group-hover:block font-label-md text-label-md px-2 text-center leading-none">HOLD FOR SOS</span>
<!-- Inner Pulse -->
<div class="absolute inset-0 border-2 border-white/30 rounded-full animate-ping opacity-20"></div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<div class="fixed bottom-24 right-gutter-mobile z-50"><button class="w-16 h-16 bg-primary/20 backdrop-blur-md border-2 border-primary/40 text-primary rounded-full flex items-center justify-center shadow-xl active:scale-95 transition-transform"><span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">shield</span></button></div><nav class="fixed bottom-0 w-full z-50 bg-surface-container-low/90 backdrop-blur-xl border-t border-outline-variant/5 shadow-[0_-4px_24px_rgba(99,102,241,0.1)] rounded-t-lg h-20 px-4 pb-safe flex justify-around items-center">
<!-- Map Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-md text-label-md">Map</span>
</a>
<!-- Contacts Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/30 rounded-full p-2 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined">group</span>
<span class="font-label-md text-label-md">Contacts</span>
</a>
<!-- Reports Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/30 rounded-full p-2 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined">assignment</span>
<span class="font-label-md text-label-md">Reports</span>
</a>
</nav>
<script>
        // Micro-interaction for SOS button
        const sosBtn = document.getElementById('sos-button');
        let timer;
        
        sosBtn.addEventListener('mousedown', () => {
            sosBtn.classList.add('bg-error-container');
            sosBtn.classList.add('text-on-error-container');
            timer = setTimeout(() => {
                alert('Emergency SOS Signal Sent to Trusted Contacts');
                sosBtn.classList.remove('bg-error-container');
            }, 2000);
        });

        sosBtn.addEventListener('mouseup', () => {
            clearTimeout(timer);
            sosBtn.classList.remove('bg-error-container');
            sosBtn.classList.remove('text-on-error-container');
        });

        sosBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            sosBtn.classList.add('bg-error-container');
            sosBtn.classList.add('text-on-error-container');
            timer = setTimeout(() => {
                alert('Emergency SOS Signal Sent to Trusted Contacts');
                sosBtn.classList.remove('bg-error-container');
            }, 2000);
        });

        sosBtn.addEventListener('touchend', () => {
            clearTimeout(timer);
            sosBtn.classList.remove('bg-error-container');
            sosBtn.classList.remove('text-on-error-container');
        });
    </script>
</body></html>
